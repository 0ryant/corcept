schema_version = "mcpact.manifest.v1"

[package]
name = "corcept-mcp"
version = "0.6.0-pre.2"
description = "MCP adapter for corcept — Claude Code hook governance + append-only audit ledger surface"
# Package-level trust ceiling. Per-tool ceilings are annotated in each tool's
# description (Reviewed / Signed / Verified) and enforced via the policy
# (approval gate + path scoping) declared on each [[tools]] entry.
trust = "Reviewed"

[cli]
name = "corcept"
binary = "corcept"
version_command = ["--version"]

[audit]
sink = "jsonl"
path = ".mcpact/audit.jsonl"

# -----------------------------------------------------------------------------
# Health / inspection
# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_doctor"
title = "Corcept Doctor"
description = "Run corcept's health-check (ledger presence, permissions, schema sanity). Authority: Observe. Trust ceiling: Reviewed."
command = ["doctor"]

[tools.args.path]
type = "path"
required = false
description = "Workspace root to inspect (defaults to current directory)."
flag = "--path"
within_workspace = true

[tools.args.validate_perms]
type = "bool"
required = false
description = "Check owner-only (0700) permissions on ledger and operator data dirs."
flag = "--validate-perms"

[tools.args.strict]
type = "bool"
required = false
description = "Fail on any check failure; validate ledger rows against JSON Schema."
flag = "--strict"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 30

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# Hook surface — programmatic ingress for non-Claude-Code drivers.
# Each hook tool wraps `corcept hook <event>`. The underlying CLI accepts its
# hook-input JSON either as the `--input <json>` flag (used by this MCP surface,
# since the McPact executor runs children with a null stdin) or, when the flag
# is omitted, from stdin (the Claude-Code piped-payload path). MCP callers pass
# the payload via the `hook_input` argument below.
# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_hook_session_start"
title = "Corcept Hook: SessionStart"
description = "Process a Claude Code SessionStart hook event. Authority: Analyze. Trust ceiling: Reviewed. Pass the hook event JSON in the hook_input argument."
command = ["hook", "session-start"]

[tools.args.hook_input]
type = "string"
required = false
description = "Claude Code hook event JSON (the payload the CLI would otherwise read from stdin). When omitted, the CLI falls back to reading stdin."
flag = "--input"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Analyze"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 30

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_hook_user_prompt_submit"
title = "Corcept Hook: UserPromptSubmit"
description = "Process a Claude Code UserPromptSubmit hook event. Authority: Analyze. Trust ceiling: Reviewed. Pass the hook event JSON in the hook_input argument."
command = ["hook", "user-prompt-submit"]

[tools.args.hook_input]
type = "string"
required = false
description = "Claude Code hook event JSON (the payload the CLI would otherwise read from stdin). When omitted, the CLI falls back to reading stdin."
flag = "--input"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Analyze"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 30

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_hook_pretool_guard"
title = "Corcept Hook: PreToolUse Guard"
description = "Evaluate the PreToolUse guard against a candidate tool call. Authority: Plan (returns a gate decision without itself mutating the ledger; the matched posttool-audit row attests the actual decision downstream). Trust ceiling: Reviewed. Pass the hook event JSON in the hook_input argument."
command = ["hook", "pretool-guard"]

[tools.args.hook_input]
type = "string"
required = false
description = "Claude Code hook event JSON (the payload the CLI would otherwise read from stdin). When omitted, the CLI falls back to reading stdin."
flag = "--input"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Plan"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 30

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_hook_posttool_audit"
title = "Corcept Hook: PostToolUse Audit"
description = "Append a corcept.event.tool_use.v1 row to the hash-chained ledger after a tool call. Authority: Mutate. Trust ceiling: Signed. Pass the hook event JSON in the hook_input argument; ledger writes are confined to .corcept/ledger/."
command = ["hook", "posttool-audit"]

[tools.args.hook_input]
type = "string"
required = false
description = "Claude Code hook event JSON (the payload the CLI would otherwise read from stdin). When omitted, the CLI falls back to reading stdin."
flag = "--input"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Mutate"
read_only = false
network = false
writes_files = true
approval = "on-mutation"
timeout_seconds = 30

[tools.env]
inherit = false
allow = ["CORCEPT_LEDGER_PATH"]

# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_hook_stop_check"
title = "Corcept Hook: Stop Check"
description = "Evaluate completion-gating (stale tests / missing evidence) on a Claude Code Stop event. Authority: Plan. Trust ceiling: Reviewed. Pass the hook event JSON in the hook_input argument."
command = ["hook", "stop-check"]

[tools.args.hook_input]
type = "string"
required = false
description = "Claude Code hook event JSON (the payload the CLI would otherwise read from stdin). When omitted, the CLI falls back to reading stdin."
flag = "--input"

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Plan"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 30

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# Audit ledger inspection
# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_audit_verify"
title = "Corcept Audit Verify"
description = "Verify the integrity of the append-only ledger hash chain. This is the ONLY supported way to determine ledger integrity. Do NOT compute SHA-256 yourself: the chain is canonicalized and domain-separated under a PUBLIC, source-visible prefix (HASH_DOMAIN = \"corcept:ledger:v1:\"), so a naive hash over the raw row bytes will not match and will false-flag a clean ledger. Report this tool's verdict VERBATIM. Read the structured result: top-level `tamper_detected: bool` is the verdict and `tampered_lines: [..]` lists the failing 1-based rows; the process also exits non-zero when tampering is detected (fail-closed). The keyless hash chain (signed=false) is a tamper-DETECTION checksum: it catches accidental corruption and a NAIVE editor who does not recompute the chain, but because the prefix is public an adversary who can read this source can rewrite a row AND recompute the whole chain, which signed=false will FALSE-PASS. Use signed=true for tamper-EVIDENCE against such an adversary: it requires a valid Ed25519 signature (from a key the adversary does not hold) on every row (Trust ceiling: Verified). Without signed, hash-chain integrity only (Trust ceiling: Signed). Authority: Observe."
command = ["audit", "verify"]

[tools.args.path]
type = "path"
required = false
description = "Workspace root containing the ledger (defaults to current directory)."
flag = "--path"
within_workspace = true

[tools.args.signed]
type = "bool"
required = false
description = "Require Ed25519 signatures on every ledger row (Verified ceiling)."
flag = "--signed"
default = false

[tools.output]
mode = "json"
max_bytes = 1048576
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 60

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# Ledger export (derived, non-authority)
# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_export_cloudevents"
title = "Corcept Export CloudEvents"
description = "Project the hash-chained ledger lines to CloudEvents JSONL (derived, non-authority). Authority: Observe (the source ledger is read-only; the output file is a derived artefact, not authority). Trust ceiling: Reviewed."
command = ["export", "cloudevents"]

[tools.args.ledger]
type = "path"
required = false
description = "Path to the ledger JSONL file (default: .corcept/ledger/events.jsonl)."
flag = "--ledger"
must_exist = true
within_workspace = true

[tools.args.out]
type = "path"
required = true
description = "Output CloudEvents JSONL path."
flag = "--out"
within_workspace = true

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = false
network = false
writes_files = true
approval = "never"
timeout_seconds = 120

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# Credential surface — approval-gated.
# -----------------------------------------------------------------------------

[[tools]]
name = "corcept_key_generate"
title = "Corcept Key Generate"
description = "Generate an operator Ed25519 signing key under the XDG data home. Authority: Credential. Trust ceiling: Verified. Approval-gated: always requires explicit operator approval before execution; refuses without it."
command = ["key", "generate"]

[tools.args.force]
type = "bool"
required = false
description = "Overwrite an existing key (still gated by approval)."
flag = "--force"
default = false

[tools.output]
mode = "json"
max_bytes = 65536
expose_stderr = false

[tools.policy]
authority = "Credential"
read_only = false
network = false
writes_files = true
approval = "always"
timeout_seconds = 30

[tools.env]
inherit = false
allow = ["XDG_DATA_HOME"]
