name: governance

# Supply-chain and security governance (ST-029).
# Complements quality.yml (Rust fmt/clippy/test/contracts/eval).

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  TRIVY_VERSION: "0.70.0"
  ACTIONLINT_VERSION: "1.7.7"
  ZIZMOR_VERSION: "1.24.1"

jobs:
  governance:
    name: governance + supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.86.0
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Install trivy
        run: |
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh" \
            | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"

      - name: Install actionlint
        run: |
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin actionlint

      - name: Install zizmor
        run: pip3 install --quiet "zizmor==${ZIZMOR_VERSION}"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Supply chain gate
        run: bash scripts/supply-chain-gate.sh strict

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-reports
          path: supply-chain-reports/
          if-no-files-found: warn
          retention-days: 14
