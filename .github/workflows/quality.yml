name: quality

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --all-targets
        env:
          PROPTEST_CASES: 32

      - name: contracts
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-contracts.sh

      - name: audit operations registry
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-audit-operations.sh

      - name: eval deterministic (skip agent)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd evals/corcept-eval-suite-v2
          ./scripts/setup_env.sh
          ./scripts/python.sh -m corcept_eval run-paired-all \
            --out ../../results/ci-deterministic \
            --repo-root ../.. \
            --plugin-dir ../../plugins/corcept \
            --skip-agent

  # Ecosystem `quality` job order (standardise-ecosystem.md): fmt → clippy → test → deny → audit.
  # `cargo audit` also runs in governance.yml via supply-chain-gate.sh; the
  # quality-job version makes the standard step order visible at the
  # canonical surface and ensures local `cargo deny check` parity with CI.
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
