name: release

# Tag push v*.*.* → quality gate, multi-platform `corcept` binaries, plugin zip,
# SHA256SUMS, optional minisign when MINISIGN_SECRET_KEY is configured.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: make check
        run: make check
        env:
          PROPTEST_CASES: 32

  build:
    name: build (${{ matrix.target }})
    needs: quality-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: corcept-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: corcept-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: corcept-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: corcept-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: corcept-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Install macOS x86_64 target (Apple Silicon runner)
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install cross (Linux arm64)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build corcept CLI
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} -p corcept-cli --locked
          else
            cargo build --release --target ${{ matrix.target }} -p corcept-cli --locked
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/corcept" dist/
          tar czf "${{ matrix.archive }}" -C dist corcept
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/corcept.exe" dist/
          Compress-Archive -Path dist/corcept.exe -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 30

  plugin:
    name: Plugin zip
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build plugin archive
        run: |
          make plugin-zip
          mv dist/corcept-plugin.zip "corcept-plugin-${{ github.ref_name }}.zip"
          sha256sum "corcept-plugin-${{ github.ref_name }}.zip" > "corcept-plugin-${{ github.ref_name }}.zip.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin
          path: |
            corcept-plugin-*.zip
            corcept-plugin-*.zip.sha256
          if-no-files-found: error

  sbom:
    name: dependency SBOM (SPDX + CycloneDX)
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # standardise-ecosystem.md SBOM requirement: SPDX 2.3 JSON (mandatory) +
      # CycloneDX 1.5 (target). Cargo-sbom emits SPDX; cargo-cyclonedx emits
      # CycloneDX. Both invoked once per tag and attested via Sigstore.
      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked --version '^0.9'

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SPDX 2.3 SBOM
        run: cargo sbom --output-format spdx_json_2_3 > corcept-${{ github.ref_name }}.spdx.json

      - name: Generate CycloneDX 1.5 SBOM
        run: cargo cyclonedx --format json --spec-version 1.5 --override-filename "corcept-${{ github.ref_name }}"

      - name: Locate CycloneDX output
        id: cdx
        run: |
          set -euo pipefail
          ROOT_SBOM="corcept-${{ github.ref_name }}.cdx.json"
          if [ ! -f "$ROOT_SBOM" ]; then
            ROOT_SBOM=$(find . -maxdepth 3 -name 'corcept-*.cdx.json' | head -1 || true)
          fi
          if [ -z "$ROOT_SBOM" ] || [ ! -f "$ROOT_SBOM" ]; then
            echo "::error::cargo-cyclonedx produced no SBOM"
            exit 1
          fi
          DEST="corcept-${{ github.ref_name }}.cyclonedx.json"
          cp "$ROOT_SBOM" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Attest SPDX SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: corcept-${{ github.ref_name }}.spdx.json

      - name: Attest CycloneDX SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.cdx.outputs.path }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: |
            corcept-${{ github.ref_name }}.spdx.json
            corcept-${{ github.ref_name }}.cyclonedx.json
          if-no-files-found: error
          retention-days: 90

  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, plugin, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS || true
          ls -la

      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y minisign

      - name: Sign release artifacts (when secret configured)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "MINISIGN_SECRET_KEY not set — publishing unsigned artifacts + SHA256SUMS only"
            exit 0
          fi
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign.key
          for f in dist/*.{tar.gz,zip}; do
            [[ -f "$f" ]] || continue
            minisign -Sm "$f" -s /tmp/minisign.key -x "${f}.minisig"
          done
          rm -f /tmp/minisign.key

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          signed="unsigned"
          if [ -n "${{ secrets.MINISIGN_SECRET_KEY }}" ]; then signed="minisign"; fi
          body="CORCEPT ${{ github.ref_name }} — doctrine parity release.

          Artifacts: corcept CLI per platform + plugin zip + SHA256SUMS.
          Release signing: ${signed} (set MINISIGN_SECRET_KEY for minisign sidecars).

          Verify:
          \`\`\`bash
          shasum -a 256 -c SHA256SUMS
          corcept audit verify
          \`\`\`

          See docs/release-trust.md and docs/RELEASE_GATES.md."
          gh release create "${{ github.ref_name }}" \
            --title "CORCEPT ${{ github.ref_name }}" \
            --verify-tag \
            --notes "$body" \
            dist/*
